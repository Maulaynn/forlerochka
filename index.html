<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для неё ❤️</title>

<link rel="stylesheet" href="style.css">
<script src="app.js" defer></script>

</head>
<body>

<div class="container">
    <section class="gallery">

        <div class="frame"><h2>Привет, любимая ❤️</h2></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/3.jpg)"></div></div>
        <div class="frame"><h3>С этого всё началось</h3></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/2.jpg)"></div></div>
        <div class="frame"><h3>Я смотрю на тебя</h3></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/9.jpg)"></div></div>
        <div class="frame"><h3>И понимаю...</h3></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/1.jpg)"></div></div>
        <div class="frame"><h3>Ты невероятная</h3></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/5.jpg)"></div></div>
        <div class="frame"><h3>С тобой так легко</h3></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/8.jpg)"></div></div>
        <div class="frame"><h3>Каждый момент с тобой</h3></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/12.jpg)"></div></div>
        <div class="frame"><h3>Даже в холод</h3></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/13.jpg)"></div></div>
        <div class="frame"><h3>Ты греешь меня</h3></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/10.jpg)"></div></div>
        <div class="frame"><h3>И делаешь счастливым</h3></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/11.jpg)"></div></div>
        <div class="frame"><h3>Твоя улыбка...</h3></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/6.jpg)"></div></div>
        <div class="frame"><h3>Навсегда в моей памяти</h3></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/7.jpg)"></div></div>
        <div class="frame"><h3>Ты была особенной всегда</h3></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/4.jpg)"></div></div>
        <div class="frame"><h3>И сейчас ты рядом со мной</h3></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/14.jpg)"></div></div>

        <div class="frame frame_bg"><div class="frame-media" style="background-image:url(img/15.jpg)"></div></div>

        <div class="frame"><h2>Я люблю тебя ❤️</h2></div>

    </section>
</div>

<img class="soundbutton paused" src="img/sound.gif">
<audio class="audio" src="music.mp3" loop></audio>

</body>
</html>
